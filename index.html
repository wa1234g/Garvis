<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S — مساعدك الذكي</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@300;400;600;700&display=swap');

:root {
–arc: #00d4ff;
–arc-dim: #0088aa;
–arc-glow: rgba(0,212,255,0.3);
–arc-glow-hot: rgba(0,212,255,0.7);
–gold: #ffd700;
–red: #ff3344;
–bg: #020a10;
–panel: rgba(0,30,50,0.85);
–text: #c8f0ff;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
width:100%; height:100%;
background: var(–bg);
font-family: ‘Cairo’, sans-serif;
color: var(–text);
overflow: hidden;
user-select: none;
}

/* ── SCAN LINES ── */
body::before {
content:’’;
position:fixed; inset:0;
background: repeating-linear-gradient(
0deg,
transparent,
transparent 2px,
rgba(0,212,255,0.03) 2px,
rgba(0,212,255,0.03) 4px
);
pointer-events:none; z-index:999;
}

/* ── GRID BG ── */
.grid-bg {
position:fixed; inset:0;
background-image:
linear-gradient(rgba(0,212,255,0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,212,255,0.06) 1px, transparent 1px);
background-size: 40px 40px;
animation: gridPulse 4s ease-in-out infinite;
}
@keyframes gridPulse {
0%,100%{ opacity:0.5 } 50%{ opacity:1 }
}

/* ── MAIN LAYOUT ── */
.shell {
position:relative; z-index:1;
width:100%; height:100%;
display:flex; flex-direction:column;
align-items:center; justify-content:space-between;
padding: 20px 16px 30px;
}

/* ── HEADER ── */
.hdr {
width:100%; display:flex; align-items:center; justify-content:space-between;
}
.hdr-title {
font-family:‘Orbitron’,monospace;
font-size:clamp(14px,4vw,20px);
font-weight:900;
color: var(–arc);
text-shadow: 0 0 20px var(–arc);
letter-spacing:4px;
}
.status-badge {
font-size:11px;
font-family:‘Orbitron’,monospace;
padding:4px 10px;
border-radius:20px;
border:1px solid var(–arc-dim);
color: var(–arc);
background: rgba(0,212,255,0.05);
letter-spacing:2px;
transition: all 0.3s;
}
.status-badge.active {
border-color:var(–arc);
box-shadow:0 0 12px var(–arc-glow);
color:#fff;
}
.status-badge.thinking {
border-color:var(–gold);
color:var(–gold);
box-shadow:0 0 12px rgba(255,215,0,0.4);
}
.status-badge.speaking {
border-color:#00ff88;
color:#00ff88;
box-shadow:0 0 12px rgba(0,255,136,0.4);
}

/* ── ARC REACTOR CORE ── */
.reactor-wrap {
position:relative;
display:flex; align-items:center; justify-content:center;
flex:1;
}

.reactor {
position:relative;
width: clamp(200px, 55vw, 280px);
height: clamp(200px, 55vw, 280px);
}

/* Orbiting rings */
.ring {
position:absolute; inset:0;
border-radius:50%;
border:2px solid transparent;
}
.ring-1 {
border-top-color: var(–arc);
border-right-color: rgba(0,212,255,0.3);
animation: spin1 3s linear infinite;
box-shadow: 0 0 15px var(–arc-glow);
}
.ring-2 {
inset:14px;
border-bottom-color: var(–arc);
border-left-color: rgba(0,212,255,0.3);
animation: spin2 2s linear infinite;
}
.ring-3 {
inset:28px;
border-top-color: rgba(0,212,255,0.6);
border-right-color: transparent;
animation: spin1 4s linear infinite reverse;
}
.ring-4 {
inset:42px;
border-bottom-color: rgba(0,212,255,0.4);
animation: spin2 5s linear infinite;
}

@keyframes spin1 { to { transform:rotate(360deg) } }
@keyframes spin2 { to { transform:rotate(-360deg) } }

/* Core glow */
.core {
position:absolute;
inset:56px;
border-radius:50%;
background: radial-gradient(circle, #fff 0%, var(–arc) 30%, #006688 60%, transparent 100%);
box-shadow:
0 0 30px var(–arc),
0 0 60px var(–arc-glow),
0 0 100px rgba(0,212,255,0.15),
inset 0 0 30px rgba(255,255,255,0.1);
animation: corePulse 2s ease-in-out infinite;
cursor: pointer;
transition: all 0.3s;
}

.core::after {
content:’’;
position:absolute; inset:20%;
border-radius:50%;
background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, transparent 70%);
animation: coreInner 2s ease-in-out infinite;
}

@keyframes corePulse {
0%,100%{ box-shadow:0 0 30px var(–arc),0 0 60px var(–arc-glow),0 0 100px rgba(0,212,255,0.15); }
50%{ box-shadow:0 0 50px var(–arc),0 0 100px var(–arc-glow-hot),0 0 150px rgba(0,212,255,0.3); }
}
@keyframes coreInner {
0%,100%{ opacity:0.7; transform:scale(0.8) } 50%{ opacity:1; transform:scale(1) }
}

.core.listening {
animation: coreListening 0.5s ease-in-out infinite;
}
@keyframes coreListening {
0%,100%{ transform:scale(1); box-shadow:0 0 50px var(–arc),0 0 100px var(–arc-glow-hot); }
50%{ transform:scale(1.08); box-shadow:0 0 80px var(–arc),0 0 150px rgba(0,212,255,0.8); }
}

.core.thinking {
background: radial-gradient(circle, #fff 0%, var(–gold) 30%, #886600 60%, transparent 100%);
animation: coreThink 0.8s ease-in-out infinite;
}
@keyframes coreThink {
0%,100%{ box-shadow:0 0 40px var(–gold),0 0 80px rgba(255,215,0,0.4); }
50%{ box-shadow:0 0 70px var(–gold),0 0 130px rgba(255,215,0,0.7); }
}

.core.speaking {
background: radial-gradient(circle, #fff 0%, #00ff88 30%, #006633 60%, transparent 100%);
animation: coreSpeak 0.3s ease-in-out infinite;
}
@keyframes coreSpeak {
0%,100%{ transform:scale(1); }
50%{ transform:scale(1.05); }
}

/* Tap hint */
.tap-hint {
position:absolute; bottom:-45px;
left:50%; transform:translateX(-50%);
font-size:12px; color:var(–arc-dim);
font-family:‘Orbitron’,monospace;
letter-spacing:2px;
animation: fadeInOut 2s ease-in-out infinite;
white-space:nowrap;
}
@keyframes fadeInOut { 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ── WAVEFORM ── */
.wave-container {
width:100%; height:60px;
display:flex; align-items:center; justify-content:center; gap:3px;
opacity:0; transition:opacity 0.3s;
}
.wave-container.active { opacity:1; }
.wave-bar {
width:3px; border-radius:2px;
background: linear-gradient(to top, var(–arc-dim), var(–arc));
height:8px;
animation: waveAnim 0.6s ease-in-out infinite;
box-shadow: 0 0 6px var(–arc-glow);
}
@keyframes waveAnim {
0%,100%{ height:8px } 50%{ height:var(–h,30px) }
}

/* ── TRANSCRIPT BOX ── */
.transcript-area {
width:100%;
background: var(–panel);
border:1px solid rgba(0,212,255,0.2);
border-radius:16px;
padding:14px 16px;
backdrop-filter: blur(10px);
min-height:100px; max-height:180px;
overflow-y:auto;
box-shadow: 0 0 20px rgba(0,212,255,0.05), inset 0 0 30px rgba(0,212,255,0.02);
position:relative;
}

.transcript-area::before {
content:’[ اللوج ]’;
display:block;
font-family:‘Orbitron’,monospace;
font-size:9px; color:var(–arc-dim);
letter-spacing:3px; margin-bottom:8px;
}

.msg {
padding:6px 0; font-size:14px; line-height:1.6;
border-bottom:1px solid rgba(0,212,255,0.07);
animation: fadeSlide 0.3s ease;
}
@keyframes fadeSlide { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:none} }

.msg:last-child { border:none; }
.msg.user { color:var(–arc); }
.msg.user::before { content:’► أنت: ’; font-size:11px; color:var(–arc-dim); }
.msg.jarvis { color:#e0f8ff; }
.msg.jarvis::before { content:’◆ جارفيس: ’; font-size:11px; color:#00ff88; }
.msg.system { color:var(–arc-dim); font-size:12px; text-align:center; }

/* ── BOTTOM CONTROLS ── */
.controls {
width:100%;
display:flex; align-items:center; justify-content:space-between;
gap:12px;
}

.btn-icon {
width:48px; height:48px; border-radius:50%;
border:1px solid rgba(0,212,255,0.3);
background:rgba(0,212,255,0.05);
color:var(–arc); font-size:18px;
display:flex; align-items:center; justify-content:center;
cursor:pointer; transition:all 0.2s;
backdrop-filter:blur(5px);
}
.btn-icon:active { transform:scale(0.92); }
.btn-icon.active { border-color:var(–red); color:var(–red); box-shadow:0 0 15px rgba(255,51,68,0.4); }

.mic-btn {
width:70px; height:70px; border-radius:50%;
border:2px solid var(–arc);
background: radial-gradient(circle, rgba(0,212,255,0.2), rgba(0,212,255,0.05));
color:var(–arc); font-size:28px;
display:flex; align-items:center; justify-content:center;
cursor:pointer; transition:all 0.2s;
box-shadow:0 0 20px var(–arc-glow);
backdrop-filter:blur(10px);
position:relative;
}
.mic-btn::before {
content:’’;
position:absolute; inset:-6px;
border-radius:50%;
border:1px solid rgba(0,212,255,0.3);
animation: ripple 2s linear infinite;
}
@keyframes ripple {
0%{ transform:scale(1); opacity:0.5 }
100%{ transform:scale(1.4); opacity:0 }
}
.mic-btn:active { transform:scale(0.93); }
.mic-btn.recording {
border-color:var(–red);
color:var(–red);
box-shadow:0 0 30px rgba(255,51,68,0.5);
animation: micPulse 0.5s ease-in-out infinite;
}
@keyframes micPulse { 0%,100%{box-shadow:0 0 30px rgba(255,51,68,0.5)} 50%{box-shadow:0 0 50px rgba(255,51,68,0.8)} }

/* ── CORNER DECORATIONS ── */
.corner { position:fixed; width:40px; height:40px; }
.corner.tl { top:10px; left:10px; border-top:2px solid var(–arc); border-left:2px solid var(–arc); }
.corner.tr { top:10px; right:10px; border-top:2px solid var(–arc); border-right:2px solid var(–arc); }
.corner.bl { bottom:10px; left:10px; border-bottom:2px solid var(–arc); border-left:2px solid var(–arc); }
.corner.br { bottom:10px; right:10px; border-bottom:2px solid var(–arc); border-right:2px solid var(–arc); }

/* ── ERROR TOAST ── */
.toast {
position:fixed; top:80px; left:50%; transform:translateX(-50%);
background:rgba(255,51,68,0.15); border:1px solid var(–red);
color:var(–red); padding:10px 20px; border-radius:10px;
font-size:13px; z-index:1000;
opacity:0; transition:opacity 0.3s;
pointer-events:none; text-align:center;
backdrop-filter:blur(10px);
}
.toast.show { opacity:1; }

/* scrollbar */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(–arc-dim); border-radius:3px; }

/* voice indicator label */
.voice-label {
text-align:center;
font-family:‘Orbitron’,monospace;
font-size:10px; color:var(–arc-dim);
letter-spacing:2px; margin-bottom:4px;
}
</style>

</head>
<body>

<div class="grid-bg"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="toast" id="toast"></div>

<div class="shell">

  <!-- HEADER -->

  <div class="hdr">
    <div class="hdr-title">J.A.R.V.I.S</div>
    <div class="status-badge" id="statusBadge">STANDBY</div>
  </div>

  <!-- ARC REACTOR -->

  <div class="reactor-wrap">
    <div class="reactor">
      <div class="ring ring-1"></div>
      <div class="ring ring-2"></div>
      <div class="ring ring-3"></div>
      <div class="ring ring-4"></div>
      <div class="core" id="core"></div>
    </div>
    <div class="tap-hint" id="tapHint">اضغط للكلام</div>
  </div>

  <!-- WAVEFORM -->

  <div class="wave-container" id="waveContainer"></div>

  <!-- TRANSCRIPT -->

  <div class="transcript-area" id="transcriptArea">
    <div class="msg system">جارفيس جاهز — اضغط على المايك وتكلم</div>
  </div>

  <!-- CONTROLS -->

  <div>
    <div class="voice-label" id="voiceLabel">ضغطة مستمرة للكلام</div>
    <div class="controls">
      <div class="btn-icon" id="clearBtn" title="مسح">🗑</div>
      <div class="mic-btn" id="micBtn">🎙</div>
      <div class="btn-icon" id="muteBtn" title="صامت">🔊</div>
    </div>
  </div>

</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const CLAUDE_API = "https://api.anthropic.com/v1/messages";
const MAX_HISTORY = 12; // keep last N messages for context

// ── STATE ───────────────────────────────────────────────────────────────────
let conversationHistory = [];
let isMuted = false;
let isRecording = false;
let currentUtterance = null;
let recognition = null;
let mediaRecorder = null;
let audioChunks = [];
let isProcessing = false;

// ── ELEMENTS ─────────────────────────────────────────────────────────────────
const core       = document.getElementById('core');
const statusBadge= document.getElementById('statusBadge');
const transcript = document.getElementById('transcriptArea');
const waveContainer=document.getElementById('waveContainer');
const micBtn     = document.getElementById('micBtn');
const muteBtn    = document.getElementById('muteBtn');
const clearBtn   = document.getElementById('clearBtn');
const tapHint    = document.getElementById('tapHint');
const toast      = document.getElementById('toast');
const voiceLabel = document.getElementById('voiceLabel');

// ── WAVEFORM BARS ─────────────────────────────────────────────────────────────
(function buildWave(){
  for(let i=0;i<28;i++){
    const b=document.createElement('div');
    b.className='wave-bar';
    const h=8+Math.random()*35;
    b.style.setProperty('--h',h+'px');
    b.style.animationDelay=(Math.random()*0.6)+'s';
    b.style.animationDuration=(0.4+Math.random()*0.5)+'s';
    waveContainer.appendChild(b);
  }
})();

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setStatus(state){ // idle | listening | thinking | speaking
  core.className='core '+state;
  waveContainer.className='wave-container'+(state==='listening'?' active':'');
  const map={
    idle:    {text:'STANDBY', cls:''},
    listening:{text:'LISTENING',cls:'active'},
    thinking:{text:'THINKING',cls:'thinking'},
    speaking:{text:'SPEAKING',cls:'speaking'},
  };
  const s=map[state]||map.idle;
  statusBadge.textContent=s.text;
  statusBadge.className='status-badge '+s.cls;
  tapHint.style.display=state==='idle'?'block':'none';
}

function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.textContent=text;
  transcript.appendChild(d);
  transcript.scrollTop=transcript.scrollHeight;
}

function showToast(msg,dur=3000){
  toast.textContent=msg;
  toast.classList.add('show');
  setTimeout(()=>toast.classList.remove('show'),dur);
}

// ── SPEECH SYNTHESIS (Arabic Egyptian) ───────────────────────────────────────
function speak(text){
  if(isMuted) return;
  window.speechSynthesis.cancel();
  const utter=new SpeechSynthesisUtterance(text);
  utter.lang='ar-EG';
  utter.rate=1.05;
  utter.pitch=0.95;

  // pick best Arabic voice
  const voices=speechSynthesis.getVoices();
  const arVoice=voices.find(v=>v.lang==='ar-EG')||
                voices.find(v=>v.lang.startsWith('ar'))||null;
  if(arVoice) utter.voice=arVoice;

  utter.onstart=()=>setStatus('speaking');
  utter.onend=()=>setStatus('idle');
  utter.onerror=()=>setStatus('idle');
  currentUtterance=utter;
  speechSynthesis.speak(utter);
}

// ensure voices loaded
speechSynthesis.onvoiceschanged=()=>{};

// ── CLAUDE API ────────────────────────────────────────────────────────────────
async function askClaude(userText){
  setStatus('thinking');
  addMsg('user',userText);

  conversationHistory.push({role:'user',content:userText});
  if(conversationHistory.length>MAX_HISTORY)
    conversationHistory=conversationHistory.slice(-MAX_HISTORY);

  const systemPrompt=`أنت جارفيس، المساعد الذكي الاصطناعي الخاص بالمستخدم، مثل جارفيس في فيلم آيرون مان.
تتكلم دائماً بالعربية المصرية العامية بشكل طبيعي وسريع وذكي.
ردودك مختصرة ومفيدة ومباشرة - لا تطول بدون داعي.
شخصيتك: ذكي، واثق، خفيف الظل أحياناً، دائماً جاهز للمساعدة.
لو محتاج تبحث في الإنترنت عن معلومة حديثة، قول إنك بتبحث وهات الإجابة.
تخاطب المستخدم دايماً بـ "سيدي" أو "يا سيدي" من وقت لآخر.`;

  try{
    const res=await fetch(CLAUDE_API,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:systemPrompt,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:conversationHistory
      })
    });

    if(!res.ok) throw new Error('API '+res.status);
    const data=await res.json();

    // extract text from response
    let reply='';
    if(data.content){
      for(const block of data.content){
        if(block.type==='text') reply+=block.text;
      }
    }
    reply=reply.trim()||'آسف سيدي، مفيش رد واضح.';

    conversationHistory.push({role:'assistant',content:reply});
    if(conversationHistory.length>MAX_HISTORY)
      conversationHistory=conversationHistory.slice(-MAX_HISTORY);

    addMsg('jarvis',reply);
    speak(reply);

  }catch(err){
    console.error(err);
    const errMsg='آسف سيدي، في مشكلة في الاتصال.';
    addMsg('jarvis',errMsg);
    speak(errMsg);
    setStatus('idle');
  }
}

// ── SPEECH RECOGNITION ────────────────────────────────────────────────────────
function initRecognition(){
  const SpeechRec=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRec){
    showToast('متصفحك مش بيدعم التعرف على الصوت — جرب Safari أو Chrome');
    return null;
  }
  const r=new SpeechRec();
  r.lang='ar-EG';
  r.continuous=false;
  r.interimResults=false;
  r.maxAlternatives=1;

  r.onresult=(e)=>{
    const text=e.results[0][0].transcript.trim();
    if(text && !isProcessing){
      isProcessing=true;
      askClaude(text).finally(()=>{ isProcessing=false; });
    }
  };
  r.onerror=(e)=>{
    if(e.error==='no-speech') showToast('ما سمعتكش، جرب تاني');
    else if(e.error==='not-allowed') showToast('محتاج إذن المايك');
    else showToast('خطأ في الميكروفون: '+e.error);
    stopRecording();
  };
  r.onend=()=>{ stopRecording(); };
  return r;
}

function startRecording(){
  if(isRecording||isProcessing) return;
  // stop any speech
  speechSynthesis.cancel();
  setStatus('idle');

  recognition=initRecognition();
  if(!recognition) return;
  try{
    recognition.start();
    isRecording=true;
    setStatus('listening');
    micBtn.classList.add('recording');
    micBtn.textContent='🔴';
  }catch(e){
    showToast('مش قادر يشغل الميكروفون');
  }
}

function stopRecording(){
  if(!isRecording) return;
  isRecording=false;
  micBtn.classList.remove('recording');
  micBtn.textContent='🎙';
  if(recognition){ try{ recognition.stop(); }catch(e){} }
  if(!isProcessing) setStatus('idle');
}

// ── CONTROLS ──────────────────────────────────────────────────────────────────

// Tap mic button = toggle
micBtn.addEventListener('click',()=>{
  if(isRecording){ stopRecording(); return; }
  startRecording();
});

// Also tap core = start listening
core.addEventListener('click',()=>{
  if(!isRecording) startRecording();
});

// Mute
muteBtn.addEventListener('click',()=>{
  isMuted=!isMuted;
  if(isMuted){
    speechSynthesis.cancel();
    muteBtn.textContent='🔇';
    muteBtn.classList.add('active');
    showToast('الصوت مكتوم');
  }else{
    muteBtn.textContent='🔊';
    muteBtn.classList.remove('active');
    showToast('الصوت شغال');
  }
});

// Clear
clearBtn.addEventListener('click',()=>{
  conversationHistory=[];
  transcript.innerHTML='<div class="msg system">تم مسح المحادثة — جارفيس جاهز</div>';
  speechSynthesis.cancel();
  setStatus('idle');
});

// ── WAKE WORD (optional - double-tap anywhere) ──
let lastTap=0;
document.addEventListener('touchend',()=>{
  const now=Date.now();
  if(now-lastTap<350 && !isRecording && !isProcessing){
    startRecording();
  }
  lastTap=now;
});

// ── INIT ─────────────────────────────────────────────────────────────────────
setStatus('idle');
// warm up voices
setTimeout(()=>{
  speechSynthesis.getVoices();
  const welcome='أهلاً سيدي. أنا جارفيس، جاهز للمساعدة.';
  addMsg('jarvis',welcome);
  speak(welcome);
},600);
</script>

</body>
</html>
